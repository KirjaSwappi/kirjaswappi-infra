# Compose reference: https://docs.docker.com/compose/compose-file/
# `deploy.resources` is applied by Docker Swarm; plain `docker compose` ignores it.
# Non-Swarm CPU/memory caps use service-level `mem_limit` / `cpus` (add per service if needed).

services:
  # ── Edge: TLS termination + reverse proxy ────────────────────────────
  # Caddy automatically obtains and renews Let's Encrypt certificates and
  # redirects HTTP→HTTPS. The actual hostnames are set via env vars
  # (PUBLIC_API_HOST, PUBLIC_WS_HOST) so this works for canary and prod.
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - '80:80'
      - '443:443'
    environment:
      - PUBLIC_API_HOST=${PUBLIC_API_HOST:-api.kirjaswappi.fi}
      - PUBLIC_WS_HOST=${PUBLIC_WS_HOST:-ans.kirjaswappi.fi}
      - ACME_EMAIL=${ACME_EMAIL:-ops@kirjaswappi.fi}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend
      - notification
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:2019/']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    networks:
      - kirjaswappi-net

  # ── Stateful services (persistent volumes) ──────────────────────────

  mongodb:
    image: mongo:8
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${SERVICE_USER_MONGODB}
      - MONGO_INITDB_ROOT_PASSWORD=${SERVICE_PASSWORD_MONGODB}
    # No host port mapping — Mongo is reachable only on the internal
    # kirjaswappi-net Docker network. For ad-hoc access, use:
    #   docker compose exec mongodb mongosh
    # or open an SSH tunnel to the host first.
    expose:
      - '27017'
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    networks:
      - kirjaswappi-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${SERVICE_PASSWORD_REDIS}
    expose:
      - '6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: redis-cli -a ${SERVICE_PASSWORD_REDIS} ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    networks:
      - kirjaswappi-net

  rabbitmq:
    image: rabbitmq:3-management
    hostname: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${SERVICE_USER_RABBITMQ}
      - RABBITMQ_DEFAULT_PASS=${SERVICE_PASSWORD_RABBITMQ}
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_stomp && rabbitmq-server"
    # Management UI not exposed on host; access via Caddy or SSH tunnel.
    expose:
      - '5672'
      - '15672'
      - '61613'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.75'
    networks:
      - kirjaswappi-net

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES}
      - POSTGRES_DB=unleash
    expose:
      - '5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${SERVICE_USER_POSTGRES} -d unleash
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    networks:
      - kirjaswappi-net

  # ── Stateless services ──────────────────────────────────────────────

  unleash:
    # Pinned to a specific tag for reproducible deploys; bump deliberately.
    image: unleashorg/unleash-server:6.6
    restart: unless-stopped
    expose:
      - '4242'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://${SERVICE_USER_POSTGRES}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/unleash
      - DATABASE_SSL=false
      - INIT_ADMIN_API_TOKENS=${UNLEASH_ADMIN_TOKEN}
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:4242/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 384m
          cpus: '0.5'
    networks:
      - kirjaswappi-net

  backend:
    image: ghcr.io/kirjaswappi/kirjaswappi-backend:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      unleash:
        condition: service_healthy
    # Backend is fronted by Caddy on the kirjaswappi-net; no host port.
    expose:
      - '10000'
    environment:
      - SPRING_PROFILES_ACTIVE=cloud
      # Refuse to start with a non-cloud Spring profile (defence in depth).
      - KIRJASWAPPI_PRODUCTION=true
      # MongoDB
      - MONGODB_URI=mongodb://${SERVICE_USER_MONGODB}:${SERVICE_PASSWORD_MONGODB}@mongodb:27017/${MONGODB_DATABASE}?authSource=admin
      - MONGODB_DATABASE=${MONGODB_DATABASE:-kirjaswappi}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${SERVICE_PASSWORD_REDIS}
      # RabbitMQ
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_AMQP_PORT=5672
      - RABBITMQ_STOMP_PORT=61613
      - RABBITMQ_USERNAME=${SERVICE_USER_RABBITMQ}
      - RABBITMQ_PASSWORD=${SERVICE_PASSWORD_RABBITMQ}
      # S3 (external)
      - S3_URL=${S3_URL}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      # Auth
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://kirjaswappi.fi,https://www.kirjaswappi.fi}
      # Unleash
      - UNLEASH_URL=http://unleash:4242/api
      - UNLEASH_INSTANCE_ID=${UNLEASH_INSTANCE_ID:-kirjaswappi-prod}
      - UNLEASH_API_KEY=${UNLEASH_API_KEY}
      # Email
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM}
      # Notification service
      - NOTIFICATION_SERVICE_HOST=notification
      - NOTIFICATION_SERVICE_PORT=50051
      - NOTIFICATION_API_KEY=${NOTIFICATION_API_KEY}
      # Frontend URL for CORS/WebSocket
      - FRONTEND_URL=${FRONTEND_URL:-https://kirjaswappi.fi,https://www.kirjaswappi.fi}
      # Super admin seed
      - SUPER_ADMIN_USERNAME=${SUPER_ADMIN_USERNAME}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD}
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:10000/actuator/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: '100m'
        max-file: '5'
    deploy:
      resources:
        limits:
          memory: 1500m
          cpus: '1.5'
    networks:
      - kirjaswappi-net

  notification:
    image: ghcr.io/kirjaswappi/kirjaswappi-notification:latest
    pull_policy: always
    restart: unless-stopped
    # Notification HTTP/WS is fronted by Caddy; gRPC stays internal-only.
    expose:
      - '50051'
      - '8080'
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY=${NOTIFICATION_API_KEY}
      - ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://kirjaswappi.fi,https://www.kirjaswappi.fi}
      - LOG_LEVEL=info
      - SHUTDOWN_TIMEOUT=30
      - ENABLE_GRPC_REFLECTION=false
      - NOTIFY_STRICT=true
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    networks:
      - kirjaswappi-net

  # ── Monitoring stack ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    user: '65534:65534'
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    expose:
      - '9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:9090/-/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    networks:
      - kirjaswappi-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    user: '65534:65534'
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env=true
      - --storage.path=/alertmanager
    expose:
      - '9093'
    environment:
      - ALERTMANAGER_DEFAULT_WEBHOOK_URL=${ALERTMANAGER_DEFAULT_WEBHOOK_URL:-}
      - ALERTMANAGER_CRITICAL_WEBHOOK_URL=${ALERTMANAGER_CRITICAL_WEBHOOK_URL:-}
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    networks:
      - kirjaswappi-net

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    user: '472:472'
    depends_on:
      prometheus:
        condition: service_started
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    expose:
      - '3000'
    volumes:
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    networks:
      - kirjaswappi-net

  # ── Backup sidecar ─────────────────────────────────────────────────
  # Runs mongodump on a daily schedule. Archives land on the host volume
  # `mongo-backups` for off-site replication (rsync/S3 on the host).
  # Env is written to /etc/kirjaswappi/cron.env at startup because cron jobs
  # do not inherit Docker environment variables.
  mongo-backup:
    build:
      context: .
      dockerfile: docker/mongo-backup/Dockerfile
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_USER=${SERVICE_USER_MONGODB}
      - MONGO_PASSWORD=${SERVICE_PASSWORD_MONGODB}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-kirjaswappi}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-14}
      - BACKUP_CRON=${BACKUP_CRON:-0 3 * * *}
    volumes:
      - mongo-backups:/backups
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.25'
    networks:
      - kirjaswappi-net

volumes:
  mongodb-data:
  redis-data:
  rabbitmq-data:
  postgres-data:
  caddy-data:
  caddy-config:
  mongo-backups:
  prometheus-data:
  grafana-data:

networks:
  kirjaswappi-net:
    driver: bridge
